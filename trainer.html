<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beck's 3BLD Trainer</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --card-bg: #1e1e1e;
            --accent-color: #3d3d3d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Controls Section */
        #controls {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .toggle-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toggle-btn:hover {
            background-color: #555;
        }

        /* Card Section - Responsive Grid/Flex */
        #flashcard-container {
            display: flex;
            flex-direction: row; /* Desktop default */
            align-items: center;
            justify-content: center;
            gap: 20px;
            cursor: pointer;
            padding: 2rem;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.1s;
            width: 90%;
            max-width: 700px;
            min-height: 250px;
            box-sizing: border-box;
        }

        #flashcard-container:active {
            transform: scale(0.98);
        }

        .cube-container {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }

        #content-area {
            flex-grow: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0; /* Prevents flex items from overflowing */
        }

        #display-text {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Fluid Typography */
        .letter-size {
            font-size: clamp(60px, 15vw, 120px);
        }

        .word-size {
            font-size: clamp(24px, 6vw, 50px);
        }

        /* Visibility Classes */
        .hidden {
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Mobile Breakpoint */
        @media (max-width: 600px) {
            #flashcard-container {
                flex-direction: column; /* Cubes go Top and Bottom */
                max-width: 320px;
                padding: 1.5rem;
                min-height: 450px;
                gap: 15px;
            }

            .cube-container {
                width: 100px;
                height: 100px;
            }
            
            #content-area {
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="view-toggle" class="toggle-btn">View: Show All</button>
    </div>

    <div id="flashcard-container">
        <!-- Left Cube -->
        <div id="cube-left" class="cube-container"></div>

        <div id="content-area">
            <div id="display-text" class="letter-size">--</div>

        <div id="cube-right" class="cube-container"></div>

         */
        let currentIndex = 0;

        const viewModes = ["Show All", "Hide Letters", "Hide Cubes"];

        const container = document.getElementById('flashcard-container');
        const textDisplay = document.getElementById('display-text');
        const cubeLeft = document.getElementById('cube-left');
        const cubeRight = document.getElementById('cube-right');
        const toggleBtn = document.getElementById('view-toggle');

        function createCubeSVG(colors) {
            return `
                <svg viewBox="0 0 100 100">
                    <path d="M50 10 L85 30 L50 50 L15 30 Z" fill="${colors.top}" />
                    <path d="M15 30 L50 50 L50 90 L15 70 Z" fill="${colors.left}" />
                    <path d="M85 30 L85 70 L50 90 L50 50 Z" fill="${colors.right}" />
                </svg>
            `;
        }

        function updateDisplay() {
            const data = FLASHCARD_DATA[currentIndex];
            const letter1 = data.letters[0];
            const letter2 = data.letters[1];

            // Update Cubes
            cubeLeft.innerHTML = createCubeSVG(CUBE_MAP[letter1] || DEFAULT_COLORS);
            cubeRight.innerHTML = createCubeSVG(CUBE_MAP[letter2] || DEFAULT_COLORS);

            // Handle Text Content and Visibility
            if (isShowingWord) {
                textDisplay.textContent = data.word;
                textDisplay.className = 'word-size';
                textDisplay.classList.remove('hidden');
            } else {
                textDisplay.textContent = data.letters;
                textDisplay.className = 'letter-size';
                
                // Immediate hide if in mode 1
                if (viewMode === 1) {
                    textDisplay.classList.add('hidden');
                } else {
                    textDisplay.classList.remove('hidden');
                }
            }

            // Handle Cubes Visibility
            if (viewMode === 2) {
                cubeLeft.classList.add('hidden');
                cubeRight.classList.add('hidden');
            } else {
                cubeLeft.classList.remove('hidden');
                cubeRight.classList.remove('hidden');
            }
        }

        function handleClick() {
            // Update state before calling updateDisplay
            if (!isShowingWord) {
                isShowingWord = true;
            } else {
                isShowingWord = false;
                // Pull from the list randomly
                currentIndex = Math.floor(Math.random() * FLASHCARD_DATA.length);
            }
            // All DOM changes happen inside updateDisplay synchronously
            updateDisplay();
        }

        function toggleView() {
            viewMode = (viewMode + 1) % 3;
            toggleBtn.textContent = `View: ${viewModes[viewMode]}`;
            updateDisplay();
        }

        // Initialize
        container.addEventListener('click', handleClick);
        toggleBtn.addEventListener('click', toggleView);
        updateDisplay();

    </script>
</body>
</html>
